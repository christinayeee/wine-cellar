<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Christina's Wine Cellar</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500&display=swap');
:root{--cream:#fbf6ec;--cream-2:#f6efe1;--card:#fffdf8;--ink:#5a4a3e;--ink-soft:#9a8b7b;--faint:#c3b6a2;--line:#e6dcc8;--line-2:#efe7d7;--wine:#9c4452;--wine-soft:#c98b93;--cork:#d8b878;--cork-2:#c49a55;--blush:#d98a86;--leaf:#9caa88}
*{box-sizing:border-box}
html,body{margin:0;background:var(--cream);color:var(--ink);font-family:'Cormorant Garamond',Georgia,'Songti SC',serif;-webkit-font-smoothing:antialiased;font-size:16px}
.ui,button,input,select,textarea{font-family:'Inter',system-ui,'PingFang SC','Microsoft YaHei',sans-serif}
.wrap{max-width:1140px;margin:0 auto;padding:48px 26px 90px}
.hd{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:20px}
.brand{display:flex;align-items:flex-end;gap:14px}
.brand h1{font-family:'Dancing Script',cursive;font-weight:700;font-size:56px;line-height:1;margin:0;color:var(--wine)}
.brand .sub{font-size:14px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-soft);margin:11px 0 0 4px;font-weight:500}
.brand .sprig{width:56px;height:44px;flex:0 0 auto;margin-bottom:4px}
.statline{display:flex;gap:22px}.statline .s{text-align:center}
.statline .s b{display:block;font-family:'Dancing Script',cursive;font-weight:700;font-size:30px;line-height:1;color:var(--ink)}
.statline .s span{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint)}
.hero{display:flex;align-items:center;gap:14px;margin:20px 0 18px;color:var(--faint)}
.hero::before,.hero::after{content:"";height:1px;background:var(--line);flex:1}.hero svg{width:172px;height:64px}
.bar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:10px}
.bar .lbl{font-style:italic;font-size:15px;color:var(--ink-soft)}
.pills{display:inline-flex;background:var(--card);border:1px solid var(--line);border-radius:22px;padding:3px;gap:2px;flex-wrap:wrap}
.pills button{border:0;background:transparent;color:var(--ink-soft);font-size:12.5px;padding:6px 12px;border-radius:18px;cursor:pointer;transition:.15s;white-space:nowrap}
.pills button:hover{color:var(--ink)}.pills button.on{background:var(--wine);color:#fff}
.addbtn{border:1px solid var(--wine);background:var(--wine);color:#fff;border-radius:22px;padding:8px 15px;font-size:13px;cursor:pointer}.addbtn:hover{background:#873a48}
.search{margin-left:auto;display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:22px;padding:7px 14px;min-width:170px}
.search input{border:0;background:transparent;outline:none;font-size:13px;color:var(--ink);width:100%}.search input::placeholder{color:var(--faint)}
.legend{display:flex;flex-wrap:wrap;gap:14px;margin:6px 0 12px;font-size:13px;color:var(--ink-soft)}
.legend span{display:inline-flex;align-items:center;gap:7px}.sw{width:11px;height:11px;border-radius:50%}
.hint{font-size:12.5px;font-style:italic;color:var(--faint);margin:0 0 22px}
.cabinet{border:1.5px solid var(--line);border-radius:22px;padding:12px 24px 20px;background:linear-gradient(180deg,rgba(255,255,255,.35),transparent 120px)}
.shelf{padding:13px 0 4px}.shelf+.shelf{border-top:1px dashed var(--line-2)}
.shelf-hd{display:flex;align-items:baseline;gap:12px;margin-bottom:4px}
.shelf-hd .no{font-family:'Dancing Script',cursive;font-weight:700;font-size:25px;color:var(--wine)}
.shelf-hd .ttl{font-style:italic;font-size:15px;color:var(--ink-soft)}
.shelf-hd .fill{margin-left:auto;font-size:12px;color:var(--faint)}.shelf-hd .fill.over{color:var(--wine)}
.lane{margin-top:8px;border-radius:9px;transition:background .12s,box-shadow .12s}
.lane.drop-hi{background:rgba(156,68,82,.08);box-shadow:inset 0 0 0 1.5px var(--wine-soft)}
.lane .slots{display:flex;flex-wrap:nowrap;gap:6px;align-items:flex-end;padding:2px 4px}
.shelfline{height:0;border-bottom:1.5px solid var(--line);margin:0 8px;position:relative}
.shelfline::before,.shelfline::after{content:"";position:absolute;bottom:-3px;width:1.5px;height:6px;background:var(--line)}
.shelfline::before{left:0}.shelfline::after{right:0}
.subtag{font-size:10px;letter-spacing:.1em;color:var(--faint);margin:3px 0 0 8px;text-transform:uppercase}
.cell{flex:1 1 0;min-width:42px;max-width:168px;background:none;border:0;padding:2px 2px 0;cursor:grab;display:flex;flex-direction:column;align-items:center;transition:transform .16s ease}
.cell.vert{max-width:82px}.cell:active{cursor:grabbing}
.cell svg{width:100%;height:auto;display:block;overflow:visible;pointer-events:none}
.cell.dragging{opacity:.35}.cell:hover{transform:translateY(-4px)}.cell.sel .glass{stroke:var(--wine);stroke-width:2.2}.cell.dim{opacity:.26}
.cap{margin-top:5px;text-align:center;line-height:1.12;max-width:100%;pointer-events:none}
.cap .nm{font-size:12px;font-weight:500;color:var(--ink);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cap .yr{font-family:'Inter';font-size:10px;color:var(--faint);margin-top:1px}
.cap .vv{font-family:'Inter';font-size:10px;color:var(--wine);margin-top:1px;font-weight:600}.cap .vv::before{content:"🍷 "}
.cap .rt{color:var(--wine);font-size:10px;letter-spacing:1px}
.ph{flex:1 1 0;min-width:42px;max-width:168px}.ph.vert{max-width:82px}.ph svg{width:100%;height:auto;display:block}
.zones{display:grid;grid-template-columns:1fr 300px;gap:22px;margin-top:26px;align-items:start}
@media(max-width:820px){.zones{grid-template-columns:1fr}}
.zone{border:1.5px dashed var(--line);border-radius:18px;padding:16px 18px;min-height:120px;transition:.12s}
.zone.drop-hi{border-color:var(--wine-soft);background:rgba(156,68,82,.05)}
.zone h3{font-family:'Dancing Script',cursive;font-weight:700;font-size:26px;margin:0 0 2px;color:var(--wine);display:flex;align-items:center;gap:8px}.zone h3 svg{width:34px;height:26px}
.zone p{font-size:13px;font-style:italic;color:var(--ink-soft);margin:0 0 12px}
.tray-row{display:flex;gap:12px;flex-wrap:wrap}.tray-row .cell{flex:0 0 110px}
.bin{background:linear-gradient(180deg,#f0e6d0,#e8dabb);border:1.5px solid var(--cork-2);border-radius:14px 14px 20px 20px}
.bin-corks{display:flex;flex-wrap:wrap;gap:9px;min-height:42px;align-items:center}
.cork{cursor:pointer;transition:transform .14s}.cork:hover{transform:translateY(-3px) rotate(-4deg)}.cork svg{width:24px;height:32px;display:block}
.bin .empty-note{font-size:12.5px;font-style:italic;color:var(--faint)}
.vignette{display:flex;justify-content:center;margin:40px 0 6px;opacity:.9}.vignette svg{width:230px;height:150px}
.foot{margin-top:8px;text-align:center;font-style:italic;font-size:14px;color:var(--ink-soft)}
.scrim{position:fixed;inset:0;background:rgba(70,55,45,.34);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:50;padding:22px}
.scrim.show{display:flex}
.card{width:min(440px,95vw);max-height:92vh;overflow-y:auto;background:var(--card);border:1px solid var(--line);border-radius:22px;padding:30px 30px 26px;position:relative;box-shadow:0 30px 70px rgba(90,74,62,.2);animation:rise .22s cubic-bezier(.2,.8,.2,1)}
@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.card .x{position:absolute;right:16px;top:12px;border:0;background:transparent;color:var(--faint);font-size:24px;cursor:pointer}.card .x:hover{color:var(--ink)}
.card .fam{display:inline-flex;align-items:center;gap:7px;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:8px}
.card h2{font-family:'Dancing Script',cursive;font-weight:700;font-size:31px;line-height:1.04;margin:0;color:var(--wine)}
.card .vint{font-size:15px;color:var(--ink-soft);margin:9px 0 16px}.card .vint b{font-family:'Dancing Script',cursive;font-size:23px;color:var(--ink);font-weight:700}
.meta{display:grid;grid-template-columns:1fr 1fr;gap:13px 18px;border-top:1px solid var(--line);padding-top:15px}
.meta label{display:block;font-size:10px;letter-spacing:.11em;text-transform:uppercase;color:var(--faint);margin-bottom:3px}.meta div{font-size:15px}
.sect{margin-top:16px;border-top:1px solid var(--line);padding-top:14px}
.sect .lab{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:6px;display:flex;align-items:center;gap:7px}
.sect p{margin:0;font-size:14.5px;line-height:1.55;color:var(--ink)}
.sect .blend{font-family:'Inter';font-size:12px;color:var(--ink-soft);margin:2px 0 6px;font-style:italic}
.vivino{margin-top:16px;border-top:1px solid var(--line);padding-top:15px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.vivino .vscore{display:flex;align-items:baseline;gap:9px}
.vivino .vnum{font-family:'Dancing Script',cursive;font-weight:700;font-size:32px;color:var(--wine);line-height:1}
.vivino .vlab{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint)}
.vivino .vlab b{display:block;font-family:'Inter';font-size:12px;color:var(--ink-soft);text-transform:none;letter-spacing:0;font-weight:400;font-style:italic}
.mine{margin-top:16px;border-top:1px solid var(--line);padding-top:14px}
.mine .lab{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:8px}
.mine .lab em{font-style:normal;text-transform:none;letter-spacing:0;color:var(--faint);font-size:11px}
.stars{display:flex;align-items:center;gap:6px;margin-bottom:16px}
.stars .st{font-size:26px;line-height:1;color:var(--line);cursor:pointer;transition:.12s;user-select:none}.stars .st.on{color:var(--wine)}.stars .st:hover{transform:scale(1.15)}
.clear{font-size:11px;color:var(--faint);background:transparent;border:0;cursor:pointer;margin-left:8px}.clear:hover{color:var(--wine)}
textarea{width:100%;min-height:70px;resize:vertical;border:1px solid var(--line);border-radius:14px;padding:11px 13px;font-size:14px;color:var(--ink);background:var(--cream);outline:none;line-height:1.5}
textarea:focus{border-color:var(--wine-soft);background:#fff}
.saved{font-size:11px;color:var(--faint);margin-top:6px;height:14px}
.lnk{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:7px 13px;border-radius:16px;border:1px solid var(--line);color:var(--wine);text-decoration:none;background:var(--cream);white-space:nowrap;transition:.14s}.lnk:hover{background:var(--wine);color:#fff;border-color:var(--wine)}
.cardbtns{margin-top:18px;display:flex;gap:10px;flex-wrap:wrap}
.btn2{font-size:12.5px;padding:8px 14px;border-radius:16px;border:1px solid var(--line);background:var(--cream);color:var(--ink);cursor:pointer}.btn2:hover{border-color:var(--wine-soft)}.btn2.wine{border-color:var(--wine);color:var(--wine)}
.form h2{font-family:'Dancing Script',cursive;font-weight:700;font-size:32px;color:var(--wine);margin:0 0 4px}
.form p{font-size:13px;font-style:italic;color:var(--ink-soft);margin:0 0 16px}
.field{margin-bottom:12px}.field label{display:block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:4px}
.field input,.field select{width:100%;border:1px solid var(--line);border-radius:11px;padding:9px 12px;font-size:14px;color:var(--ink);background:var(--cream);outline:none}
.field input:focus,.field select:focus{border-color:var(--wine-soft);background:#fff}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form .go{width:100%;margin-top:8px;border:0;background:var(--wine);color:#fff;border-radius:14px;padding:12px;font-size:14px;cursor:pointer}.form .go:hover{background:#873a48}
.cabinet-wrap{position:relative}
.hippo-peek{position:absolute;top:-40px;right:38px;width:92px;height:56px;z-index:2;pointer-events:none;filter:drop-shadow(0 3px 4px rgba(90,74,62,.15))}
@media(max-width:560px){.hippo-peek{width:70px;height:43px;top:-30px;right:16px}}
/* password gate */
#gate{position:fixed;inset:0;z-index:200;background:radial-gradient(120% 90% at 50% 0%,#fff7ea,var(--cream));display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:26px;text-align:center}
#gate.hide{display:none}
#gate .ghippo{width:150px;height:150px;margin-bottom:4px}
#gate h1{font-family:'Dancing Script',cursive;font-weight:700;font-size:44px;color:var(--wine);margin:0}
#gate .gsub{font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:var(--ink-soft);margin:6px 0 22px}
#gate .grow{display:flex;gap:10px;align-items:center}
#gate input{border:1.5px solid var(--line);border-radius:14px;padding:12px 16px;font-size:16px;color:var(--ink);background:var(--card);outline:none;width:200px;text-align:center;letter-spacing:.2em}
#gate input:focus{border-color:var(--wine-soft)}
#gate button{border:0;background:var(--wine);color:#fff;border-radius:14px;padding:12px 20px;font-size:15px;cursor:pointer}
#gate button:hover{background:#873a48}
#gate .gerr{color:var(--wine);font-size:13px;height:18px;margin-top:12px;font-style:italic}
.flag{display:inline-flex;vertical-align:middle}.flag svg{width:15px;height:10px;border:.5px solid rgba(90,74,62,.2);border-radius:2px}
.hero-art svg{width:200px;height:auto;display:block}
.gart{display:block}.gart svg{width:210px;height:auto;display:block;margin:0 auto 6px}
.info2{margin-top:16px;border-top:1px solid var(--line);padding-top:14px}
.info2 .irow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:4px 0}
.info2 .ilab{font-size:12.5px;color:var(--ink-soft)}
.info2 .ival{font-size:14px;color:var(--ink);display:flex;align-items:center;gap:8px}
.info2 .ival b{font-family:'Dancing Script',cursive;font-size:22px;color:var(--wine);font-weight:700}
.info2 .ival em{font-style:italic;color:var(--faint);font-size:11px}
.lnk.sm{padding:4px 9px;font-size:11px}
.info2 .inote{font-size:10.5px;color:var(--faint);font-style:italic;margin-top:7px;line-height:1.45}
</style>
</head>
<body>
<div id="gate">
  <span class="gart" id="gateArt"></span>
  <h1>Christina's Wine Cellar</h1>
  <div class="gsub">请输入密码</div>
  <div class="grow"><input id="gpw" type="password" inputmode="numeric" placeholder="密码" autocomplete="off"><button id="gbtn">进入 →</button></div>
  <div class="gerr" id="gerr"></div>
</div>
<div class="wrap">
  <div class="hd">
    <div class="brand">
      <svg class="sprig" viewBox="0 0 60 44" fill="none">
        <path d="M30 42 C30 30 30 22 30 14" stroke="var(--leaf)" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M30 30 C22 28 18 24 16 18 C24 18 29 22 30 28" fill="var(--leaf)" fill-opacity=".3" stroke="var(--leaf)" stroke-width="1.2"/>
        <path d="M30 24 C38 22 42 18 44 12 C36 12 31 16 30 22" fill="var(--leaf)" fill-opacity=".3" stroke="var(--leaf)" stroke-width="1.2"/>
        <circle cx="30" cy="10" r="5" fill="var(--blush)" fill-opacity=".55" stroke="var(--wine)" stroke-width="1.2"/>
        <circle cx="24" cy="7" r="3.4" fill="var(--blush)" fill-opacity=".4" stroke="var(--wine)" stroke-width="1"/>
        <circle cx="37" cy="7" r="3.4" fill="var(--blush)" fill-opacity=".4" stroke="var(--wine)" stroke-width="1"/>
      </svg>
      <div><h1>Christina's Wine Cellar</h1><div class="sub">a cozy little cellar</div></div>
    </div>
    <div class="statline" id="statline"></div>
  </div>
  <div class="hero">
    <span class="hero-art" id="heroArt"></span>
  </div>
  <div class="bar ui">
    <span class="lbl">产地</span><div class="pills" id="fCountry"></div>
    <span class="lbl">评分</span><div class="pills" id="fRate"><button data-r="all" class="on">全部</button><button data-r="4">★4+</button><button data-r="3">★3+</button><button data-r="0">未评</button></div>
    <button class="addbtn" id="addBtn">＋ 新增酒瓶</button>
    <div class="search"><span style="color:var(--faint)">⌕</span><input id="q" placeholder="搜酒庄/产区/品种/年份"></div>
  </div>
  <div class="legend" id="legend"></div>
  <div class="cabinet" id="shelves"></div>
  <div class="zones">
    <div class="zone" id="trayZone" data-drop="tray"><h3>还没归位的</h3><p>新加的、或没位置的酒都在这儿——拖进上面的柜子摆好。</p><div class="tray-row" id="trayList"></div></div>
    <div class="zone bin" id="binZone" data-drop="bin"><h3>已喝完
      <svg viewBox="0 0 34 26" fill="none" stroke="var(--wine)" stroke-width="1.3" stroke-linecap="round"><path d="M8 4 C8 12 12 15 14 15 C16 15 20 12 20 4 Z" fill="var(--wine)" fill-opacity=".2"/><path d="M8 4 L20 4 M14 15 L14 21 M9 22 L19 22"/><path d="M24 6 C24 12 27 14 28.5 14 C30 14 33 12 33 6 Z" fill="var(--wine)" fill-opacity=".15"/><path d="M28.5 14 L28.5 19 M25 20 L32 20"/></svg></h3>
      <p>喝完的拖进来，留个酒塞做纪念。点酒塞可放回。</p><div class="bin-corks" id="binList"></div></div>
  </div>
  <div class="vignette">
    <svg viewBox="0 0 230 150" fill="none" stroke="var(--ink)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
      <ellipse cx="115" cy="112" rx="98" ry="15" fill="#fff" fill-opacity=".4"/><path d="M60 118 L64 145 M170 118 L166 145 M40 122 Q115 138 190 122"/>
      <path d="M64 108 L64 60 Q64 50 70 46 L70 36 L80 36 L80 46 Q86 50 86 60 L86 108 Z" fill="#7d2b34" fill-opacity=".34"/><rect x="71" y="28" width="8" height="9" rx="1.5" fill="var(--cork)" fill-opacity=".6"/><rect x="66" y="72" width="18" height="20" rx="2" fill="#fff" fill-opacity=".5"/>
      <path d="M104 108 L104 86 M92 74 C92 82 98 86 104 86 C110 86 116 82 116 74 Z" fill="var(--wine)" fill-opacity=".26"/><path d="M92 74 L116 74 M96 108 L112 108"/>
      <path d="M150 108 L146 88 L168 88 L164 108 Z" fill="#fff" fill-opacity=".5"/><path d="M157 88 C157 78 157 72 157 66" stroke="var(--leaf)" stroke-width="1.2"/>
      <path d="M150 84 C144 80 142 74 143 68 C150 70 153 76 154 82" stroke="var(--leaf)" stroke-width="1.1" fill="var(--leaf)" fill-opacity=".25"/><path d="M164 82 C170 78 172 72 171 66 C165 68 161 73 160 80" stroke="var(--leaf)" stroke-width="1.1" fill="var(--leaf)" fill-opacity=".25"/>
      <circle cx="157" cy="60" r="6" fill="var(--blush)" fill-opacity=".5" stroke="var(--wine)" stroke-width="1.2"/><circle cx="147" cy="64" r="4" fill="#c9ab55" fill-opacity=".5" stroke="var(--wine)" stroke-width="1"/><circle cx="168" cy="64" r="4" fill="var(--blush)" fill-opacity=".4" stroke="var(--wine)" stroke-width="1"/>
      <g stroke="#5f3a5c" stroke-width="1"><circle cx="196" cy="104" r="3" fill="#5f3a5c" fill-opacity=".3"/><circle cx="202" cy="106" r="3" fill="#5f3a5c" fill-opacity=".3"/><circle cx="199" cy="110" r="3" fill="#5f3a5c" fill-opacity=".3"/></g>
    </svg>
  </div>
  <div class="foot">评分、笔记、移位、新增都存在你自己的浏览器里 · 拖拽在电脑上体验最佳</div>
</div>
<div class="scrim" id="scrim"><div class="card" id="card"></div></div>

function shortName(w){let s=w.winery;const map=[['Barons de Rothschild Lafite Collection Reserve Speciale','Lafite Rés. Spéciale'],['Pichon-Longueville Comtesse de Lalande','Pichon Comtesse'],['Bennati Cerasum Riserva della Famiglia Bennati Amarone della Valpolicella Riserva DOCG','Bennati Amarone'],['东风酒庄陶罐自然甜红葡萄酒','东风·自然甜红'],['Sine Qua Non','SQN'],['Chateau Petrus','Pétrus'],['Chateau ',''],['Château ',''],[' Premier Grand Cru',''],[' Estate Grown',''],[' Gran Reserva','']];
  for(const [a,b] of map) s=s.split(a).join(b);

const base=WINES.slice();
base.forEach((w,i)=>{w._id=w.loc?('L'+w.loc):('b'+i+'|'+w.winery+'|'+w.vintage);});
const LS='cwc:cellar3';
let state={moves:{},meta:{},added:[],finished:[]};
try{Object.assign(state,JSON.parse(localStorage.getItem(LS)||'{}'))}catch(e){}
state.moves=state.moves||{};state.meta=state.meta||{};state.added=state.added||[];state.finished=state.finished||[];
function save(){try{localStorage.setItem(LS,JSON.stringify(state))}catch(e){}}
function allWines(){return base.concat(state.added)}
function wineById(id){return allWines().find(w=>w._id===id)}
function isFinished(w){return state.finished.includes(w._id)}
function effLoc(w){if(isFinished(w))return null;if(w._id in state.moves)return state.moves[w._id];return w.loc;}
function subKey(loc){if(!loc)return null;const a=loc.split('-');return a[0]+'-'+a[1];}
function pOf(loc){return parseFloat(loc.split('-')[2]);}
function sublevelWines(l,s){return allWines().filter(w=>!isFinished(w)&&subKey(effLoc(w))===`${l}-${s}`).sort((a,b)=>pOf(effLoc(a))-pOf(effLoc(b)));}
function rankOf(w){const l=effLoc(w);if(!l)return null;const a=l.split('-');return sublevelWines(a[0],a[1]).indexOf(w)+1;}
function getR(w){return (state.meta[w._id]&&state.meta[w._id].r)||0}
function getN(w){return (state.meta[w._id]&&state.meta[w._id].n)||''}
function setMeta(w,k,v){state.meta[w._id]=state.meta[w._id]||{};state.meta[w._id][k]=v;save()}
function unfinish(id){state.finished=state.finished.filter(x=>x!==id)}
function placeInLane(id,l,s,index){const w=wineById(id);if(!w)return;unfinish(id);
  const list=sublevelWines(l,s).filter(x=>x._id!==id);let P;
  if(list.length===0)P=1;else if(index<=0)P=pOf(effLoc(list[0]))/2;else if(index>=list.length)P=pOf(effLoc(list[list.length-1]))+1;else P=(pOf(effLoc(list[index-1]))+pOf(effLoc(list[index])))/2;
  state.moves[id]=`${l}-${s}-${P}`;save();render();}
function unplace(id){unfinish(id);state.moves[id]=null;save();render();}
function finish(id){if(!state.finished.includes(id))state.finished.push(id);save();render();closeCard();}
function restore(id){unfinish(id);save();render();closeCard();}

function render(){let html='';
  for(const lvl of Object.keys(STRUCTURE)){const subs=STRUCTURE[lvl];const cap=subs.reduce((a,b)=>a+b,0);const vert=STANDING.includes(+lvl);
    let filled=0;const order=subs.map((x,i)=>i+1).reverse();let lanes='';
    for(const s of order){const arr=sublevelWines(lvl,s);filled+=arr.length;const nominal=subs[s-1];
      let slots=arr.map(w=>cellHTML(w,vert)).join('');
      for(let k=arr.length;k<nominal;k++)slots+=`<div class="ph${vert?' vert':''}">${vert?emptyStanding():emptyLying()}</div>`;
      lanes+=`<div class="lane" data-lane="${lvl}-${s}"><div class="slots">${slots}</div><div class="shelfline"></div>${subs.length>1?`<div class="subtag">S${s}</div>`:''}</div>`;}
    html+=`<div class="shelf"><div class="shelf-hd"><span class="no">${String(lvl).padStart(2,'0')}</span><span class="ttl">第 ${lvl} 层${vert?' · 站立摆放':''}</span></div>${lanes}</div>`;}
  document.getElementById('shelves').innerHTML=html;
  const tray=allWines().filter(w=>!isFinished(w)&&!effLoc(w));
  document.getElementById('trayList').innerHTML=tray.length?tray.map(w=>cellHTML(w,false)).join(''):'<p style="color:var(--faint);font-style:italic;font-size:13px">都归位啦 ✿</p>';
  const fin=allWines().filter(isFinished);
  document.getElementById('binList').innerHTML=fin.length?fin.map(w=>`<div class="cork" data-cork="${esc(w._id)}" title="${esc(w.winery)} ${w.vintage||''}">${corkSVG()}</div>`).join(''):'<span class="empty-note">还没有喝完的～</span>';
  updateStats();applyFilters();}
function updateStats(){const act=allWines().filter(w=>!isFinished(w));
  const wineries=new Set(act.map(w=>w.winery)).size;const yrs=act.map(w=>w.vintage).filter(Boolean);
  document.getElementById('statline').innerHTML=[['在柜',act.length],['酒庄',wineries],['年份',(Math.min(...yrs))+'–'+(Math.max(...yrs))]].map(([k,v])=>`<div class="s"><b>${v}</b><span>${k}</span></div>`).join('');}
function buildLegend(){const present=new Set(allWines().map(w=>w.grape));const ordered=grapeOrder().filter(g=>present.has(g)&&GRAPE[g]);
  document.getElementById('legend').innerHTML=ordered.map(g=>`<span><i class="sw" style="background:${GRAPE[g].c}"></i>${GRAPE[g].label}</span>`).join('');}
function buildCountryFilter(){const cs=[...new Set(allWines().map(w=>w.country).filter(Boolean))];
  const zh={France:'法国',USA:'美国',Australia:'澳洲',Italy:'意大利',China:'中国','New Zealand':'新西兰',Chile:'智利'};
  document.getElementById('fCountry').innerHTML=`<button data-c="all" class="on">全部</button>`+cs.map(c=>`<button data-c="${esc(c)}">${zh[c]||c}</button>`).join('');}

// drag & drop
let dragId=null;
document.addEventListener('dragstart',e=>{const c=e.target.closest('.cell');if(!c)return;dragId=c.dataset.id;c.classList.add('dragging');e.dataTransfer.effectAllowed='move';try{e.dataTransfer.setData('text/plain',dragId)}catch(_){}});
document.addEventListener('dragend',e=>{const c=e.target.closest('.cell');if(c)c.classList.remove('dragging');document.querySelectorAll('.drop-hi').forEach(x=>x.classList.remove('drop-hi'));dragId=null;});
function zoneOf(el){return el.closest('.lane')||el.closest('[data-drop]')}
document.addEventListener('dragover',e=>{const z=zoneOf(e.target);if(!z||!dragId)return;e.preventDefault();if(!z.classList.contains('drop-hi')){document.querySelectorAll('.drop-hi').forEach(x=>x.classList.remove('drop-hi'));z.classList.add('drop-hi');}});
function laneInsertIndex(lane,x){const cells=[...lane.querySelectorAll('.cell')];for(let i=0;i<cells.length;i++){const r=cells[i].getBoundingClientRect();if(x<r.left+r.width/2)return i;}return cells.length;}
document.addEventListener('drop',e=>{const z=zoneOf(e.target);if(!z||!dragId)return;e.preventDefault();const id=dragId;
  if(z.getAttribute('data-drop')==='bin')finish(id);else if(z.getAttribute('data-drop')==='tray')unplace(id);
  else if(z.dataset.lane){const[l,s]=z.dataset.lane.split('-');placeInLane(id,l,s,laneInsertIndex(z,e.clientX));}});

// card
const scrim=document.getElementById('scrim'),card=document.getElementById('card');
function wsUrl(w){return 'https://www.wine-searcher.com/find/'+encodeURIComponent(`${w.winery} ${w.vintage||''}`.trim());}
function vvUrl(w){return 'https://www.vivino.com/search/wines?q='+encodeURIComponent(`${w.winery} ${w.vintage||''}`.trim());}
function locText(w){if(isFinished(w))return '已喝完';const l=effLoc(w);if(!l)return '还没归位';const a=l.split('-');return `第 ${a[0]} 层 · 子层 S${a[1]} · 左起第 ${rankOf(w)} 位`;}
function starRow(w){let s='';const r=getR(w);for(let i=1;i<=5;i++)s+=`<span class="st${i<=r?' on':''}" data-v="${i}">★</span>`;return s+`<button class="clear" data-v="0">清除</button>`;}
function paintStars(w){const r=getR(w);card.querySelectorAll('#stars .st').forEach(x=>x.classList.toggle('on',+x.dataset.v<=r));}
function openCard(w){const g=GRAPE[w.grape]||GRAPE.Other;const vv=w.vivino;
  card.innerHTML=`<button class="x" data-close>×</button>
    <div class="fam"><i class="sw" style="background:${g.c}"></i>${g.label}</div>
    <h2>${esc(w.winery)}</h2>
    <div class="vint">年份 <b>${w.vintage||'NV'}</b></div>
    <div class="meta"><div><label>产区</label><div>${esc(w.region||'—')}</div></div><div><label>国家</label><div>${esc(w.country||'—')}</div></div><div><label>位置</label><div>${locText(w)}</div></div><div><label>瓶型</label><div>${esc(w.bottle||'750ml')}</div></div></div>
    <div class="sect"><div class="lab">🍇 葡萄品种</div>${w.grapeRaw?`<div class="blend">${esc(w.grapeRaw)}</div>`:''}<p>${g.desc}</p></div>
    <div class="sect"><div class="lab">📖 关于这瓶</div><p>${wineDesc(w)}</p></div>
    <div class="info2">
      <div class="irow"><div class="ilab">Vivino 评分</div><div class="ival">${vv?`<b>${w.vest?'≈':''}${vv}</b> / 5${w.vest?' <em>参考</em>':''}`:'<em>暂无</em>'}<a class="lnk sm" target="_blank" rel="noopener" href="${vvUrl(w)}">↗</a></div></div>
      <div class="irow"><div class="ilab">参考市场价</div><div class="ival">${w.price?`<b>≈ $${Number(w.price).toLocaleString()}</b> <em>/瓶</em>`:'<em>暂无</em>'}<a class="lnk sm" target="_blank" rel="noopener" href="${wsUrl(w)}">查实时价 ↗</a></div></div>
      <div class="inote">Vivino 评分与市场价均为参考，随年份、批次与市场波动；以链接的实时数据为准。</div>
    </div>
    <div class="mine"><div class="lab">我的评分 <em>· 喝过再打，没喝可留空</em></div><div class="stars" id="stars">${starRow(w)}</div><div class="lab">我的品尝笔记</div><textarea id="note" placeholder="香气、口感、和谁一起喝的、配了什么、还想不想再买……">${esc(getN(w))}</textarea><div class="saved" id="saved"></div></div>
    <div class="cardbtns">${isFinished(w)?`<button class="btn2 wine" data-restore="${esc(w._id)}">↩ 放回酒柜</button>`:`<button class="btn2" data-finish="${esc(w._id)}">🥂 标为喝完</button>`}</div>`;
  const stars=card.querySelector('#stars');
  stars.querySelectorAll('.st').forEach(el=>{el.addEventListener('mouseenter',()=>{const v=+el.dataset.v;stars.querySelectorAll('.st').forEach(x=>x.classList.toggle('on',+x.dataset.v<=v));});el.addEventListener('click',()=>{setMeta(w,'r',+el.dataset.v);paintStars(w);render();});});
  stars.querySelector('.clear').addEventListener('click',()=>{setMeta(w,'r',0);paintStars(w);render();});
  stars.addEventListener('mouseleave',()=>paintStars(w));
  const ta=card.querySelector('#note'),sv=card.querySelector('#saved');let t;
  ta.addEventListener('input',()=>{clearTimeout(t);t=setTimeout(()=>{setMeta(w,'n',ta.value);sv.textContent='已保存 ✓';setTimeout(()=>sv.textContent='',1200);},400);});
  scrim.classList.add('show');}
window.closeCard=()=>scrim.classList.remove('show');
scrim.addEventListener('click',e=>{if(e.target===scrim||e.target.hasAttribute('data-close'))closeCard();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeCard();closeForm();}});
document.body.addEventListener('click',e=>{const fin=e.target.closest('[data-finish]');if(fin){finish(fin.dataset.finish);return;}const res=e.target.closest('[data-restore]');if(res){restore(res.dataset.restore);return;}const cork=e.target.closest('[data-cork]');if(cork){const w=wineById(cork.dataset.cork);if(w)openCard(w);return;}const c=e.target.closest('.cell');if(c){const w=wineById(c.dataset.id);if(w){document.querySelectorAll('.cell.sel').forEach(x=>x.classList.remove('sel'));c.classList.add('sel');openCard(w);}}});

// add form
const formScrim=document.getElementById('formScrim'),formCard=document.getElementById('formCard');
function openForm(){const opts=grapeOrder().map(g=>`<option value="${g}">${GRAPE[g].label}</option>`).join('');
  formCard.innerHTML=`<button class="x" data-cform>×</button><h2>新增一瓶</h2><p>填好后它会出现在「还没归位」，再拖进柜子就行。</p>
    <div class="field"><label>酒名 *</label><input id="f_winery" placeholder="如 Screaming Eagle / Chateau Palmer"></div>
    <div class="frow"><div class="field"><label>年份</label><input id="f_vintage" placeholder="2019" inputmode="numeric"></div><div class="field"><label>主要葡萄品种</label><select id="f_grape">${opts}</select></div></div>
    <div class="frow"><div class="field"><label>国家</label><input id="f_country" placeholder="France / USA…"></div><div class="field"><label>产区</label><input id="f_region" placeholder="如 Napa Valley"></div></div>
    <div class="field"><label>混酿比例（可选）</label><input id="f_graw" placeholder="如 60% Cabernet, 40% Merlot"></div>
    <button class="go" id="f_go">加入酒柜</button>`;
  formCard.querySelector('#f_go').addEventListener('click',()=>{const winery=formCard.querySelector('#f_winery').value.trim();if(!winery){formCard.querySelector('#f_winery').focus();return;}const vRaw=formCard.querySelector('#f_vintage').value.trim();
    state.added.push({_id:'u'+Date.now(),winery,name:null,vintage:vRaw?(parseInt(vRaw,10)||vRaw):null,grape:formCard.querySelector('#f_grape').value,grapeRaw:formCard.querySelector('#f_graw').value.trim()||null,country:formCard.querySelector('#f_country').value.trim()||null,region:formCard.querySelector('#f_region').value.trim()||null,loc:null,vivino:null,vest:false,bottle:null});
    save();buildLegend();buildCountryFilter();wireCountry();render();document.getElementById('heroArt').innerHTML=coupleSVG();closeForm();document.getElementById('trayZone').scrollIntoView({behavior:'smooth',block:'center'});});
  formScrim.classList.add('show');}
window.closeForm=()=>formScrim.classList.remove('show');
formScrim.addEventListener('click',e=>{if(e.target===formScrim||e.target.hasAttribute('data-cform'))closeForm();});
document.getElementById('addBtn').addEventListener('click',openForm);

// filters
let fc='all',fr='all',fq='';
function applyFilters(){document.querySelectorAll('.cell').forEach(b=>{const w=wineById(b.dataset.id);if(!w)return;let ok=true;
  if(fc!=='all'&&w.country!==fc)ok=false;
  if(fr!=='all'){const r=getR(w);if(fr==='0'&&r!==0)ok=false;if(fr==='4'&&r<4)ok=false;if(fr==='3'&&r<3)ok=false;}
  if(fq){const hay=`${w.winery} ${w.region||''} ${w.grape||''} ${w.grapeRaw||''} ${w.vintage||''}`.toLowerCase();if(!hay.includes(fq))ok=false;}
  b.classList.toggle('dim',!ok);});}
function wire(id,fn){document.getElementById(id).addEventListener('click',e=>{const btn=e.target.closest('button');if(!btn)return;[...e.currentTarget.children].forEach(x=>x.classList.toggle('on',x===btn));fn(btn);});}
function wireCountry(){const el=document.getElementById('fCountry');el.onclick=e=>{const btn=e.target.closest('button');if(!btn)return;[...el.children].forEach(x=>x.classList.toggle('on',x===btn));fc=btn.dataset.c;applyFilters();};}
wire('fRate',b=>{fr=b.dataset.r;applyFilters();});
document.getElementById('q').addEventListener('input',e=>{fq=e.target.value.trim().toLowerCase();applyFilters();});

buildLegend();buildCountryFilter();wireCountry();render();document.getElementById('heroArt').innerHTML=coupleSVG();

// password gate (client-side; see notes)
(function(){const gate=document.getElementById('gate'),pw=document.getElementById('gpw'),btn=document.getElementById('gbtn'),err=document.getElementById('gerr');const PW='123456';try{document.getElementById('gateArt').innerHTML=coupleSVG();}catch(e){}
  function ok(){gate.classList.add('hide');try{sessionStorage.setItem('cwc:auth','1')}catch(e){}}
  try{if(sessionStorage.getItem('cwc:auth')==='1')gate.classList.add('hide');}catch(e){}
  function tryit(){if(pw.value===PW)ok();else{err.textContent='密码不对，再试一次～';pw.value='';pw.focus();}}
  btn.addEventListener('click',tryit);pw.addEventListener('keydown',e=>{if(e.key==='Enter')tryit();});
  if(!gate.classList.contains('hide'))setTimeout(()=>pw.focus(),100);})();
</script>
</body>
</html>
